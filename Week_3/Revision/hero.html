<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stacked Card Hero</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.hero {
  height: 100vh;
  display: flex;
  background: #0a0a0a; /* Dark background like reference */
  color: #fff;
  overflow: hidden;
}

/* LEFT SIDE */
.hero-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px;
  z-index: 10;
}

.hero-left h1 {
  font-size: 64px;
  margin-bottom: 16px;
  line-height: 1.1;
}

.btn {
  display: inline-block;
  padding: 14px 28px;
  background: #fff;
  color: #000;
  border-radius: 30px;
  text-decoration: none;
  width: fit-content;
  font-weight: bold;
  margin-top: 20px;
}

/* RIGHT SIDE (The Stack) */
.hero-right {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* INDIVIDUAL CARD STYLE */
.card {
  position: absolute;
  width: 320px;
  height: 420px;
  background: #1a1a1a; /* Dark card base */
  padding: 15px 15px 60px 15px; /* Space for label at bottom */
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s ease;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 4px;
  filter: grayscale(20%);
}

.card .label {
  position: absolute;
  bottom: 15px;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: #ddd;
}

/* SHUFFLE ANIMATION (When a card leaves) */
.card.exit {
  transform: translate(150%, -20%) rotate(25deg) scale(0.8) !important;
  opacity: 0;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero { flex-direction: column; }
  .hero-left { padding: 40px; text-align: center; align-items: center; }
  .hero-left h1 { font-size: 40px; }
  .hero-right { height: 60vh; }
  .card { width: 260px; height: 340px; }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-left">
    <h1>Explore the <br> Unknown</h1>
    <p>Journey through the most breathtaking landscapes on earth.</p>
    <a href="#" class="btn">View Gallery</a>
  </div>

  <div class="hero-right" id="stack">
    <!-- Cards are generated/managed via JS for easier rotation handling -->
    <div class="card" data-label="Canada">
      <img src="https://images.pexels.com/photos/36959044/pexels-photo-36959044.jpeg">
      <div class="label">Canada</div>
    </div>
    <div class="card" data-label="New Zealand">
      <img src="https://images.pexels.com/photos/31485845/pexels-photo-31485845.jpeg">
      <div class="label">New Zealand</div>
    </div>
    <div class="card" data-label="Japan">
      <img src="https://images.pexels.com/photos/36873706/pexels-photo-36873706.jpeg">
      <div class="label">Japan</div>
    </div>
    <div class="card" data-label="Norway">
      <img src="https://images.pexels.com/photos/35890516/pexels-photo-35890516.jpeg">
      <div class="label">Norway</div>
    </div>
  </div>
</section>

<script>
const stack = document.getElementById("stack");
const cards = Array.from(stack.querySelectorAll(".card"));

// Initial scattered positions
function layoutCards() {
  cards.forEach((card, index) => {
    // Reverse index so the first items in HTML are on top
    const zIndex = cards.length - index;
    card.style.zIndex = zIndex;

    // Apply random-looking rotation and slight offset
    const rotate = (index % 2 === 0 ? 1 : -1) * (index * 3 + 2);
    const xOffset = index * -5;
    const yOffset = index * -5;
    
    card.style.transform = `translate(${xOffset}px, ${yOffset}px) rotate(${rotate}deg)`;
  });
}

function shuffle() {
  const topCard = cards.shift(); // Remove the top card from array
  
  // 1. Add exit class for animation
  topCard.classList.add("exit");

  // 2. Wait for animation, then move to bottom of stack
  setTimeout(() => {
    topCard.classList.remove("exit");
    stack.appendChild(topCard); // Move element to bottom in DOM
    cards.push(topCard); // Add back to end of array
    layoutCards(); // Re-calculate z-index and rotation
  }, 600);
}

// Start the cycle
layoutCards();
setInterval(shuffle, 3500);

// Also shuffle on click
stack.addEventListener("click", shuffle);
</script>

</body>
</html>
